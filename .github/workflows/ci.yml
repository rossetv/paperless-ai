name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-flight run for the same branch/PR when a new one is triggered.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: jobs opt in to the permissions they need.
permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install .

      - name: Run tests with coverage
        # -n auto distributes the suite across the runner's cores (pytest-xdist).
        # pytest-cov combines the per-worker coverage data automatically, so the
        # --cov-fail-under gate still measures the whole suite.
        run: pytest -q -n auto --cov=common --cov=ocr --cov=classifier --cov=store --cov=indexer --cov=search --cov-report=term-missing --cov-fail-under=70

      - name: Type-check (all packages)
        run: mypy src

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.15.16

      - name: ruff check
        run: ruff check src tests

      - name: ruff format
        run: ruff format --check src tests

  security-scan:
    name: Security scan (bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install bandit
        run: pip install "bandit[toml]==1.9.4"

      - name: bandit
        # `-ll` reports MEDIUM severity and above (LOW noise filtered out).
        run: bandit -r src/ -ll -f txt

  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project + pip-audit
        # No lockfile in this repo, so audit the actual installed environment
        # (resolved from pyproject) rather than a hashed requirements file.
        # Upgrade pip AND setuptools first — both ship pre-installed in the
        # GHA Python env pip-audit scans, and the bundled copies routinely
        # carry known CVEs the latest releases have fixed (pip historically;
        # setuptools 79.0.1 / PYSEC-2026-3447 red-flagged main on 2026-07-15).
        run: |
          python -m pip install --upgrade pip setuptools
          pip install .
          pip install pip-audit==2.10.1

      - name: pip-audit
        run: pip-audit

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        # --omit=dev: only production deps matter for deployed risk.
        # --audit-level=high: treat high/critical as a build failure; moderate
        # and below are noise in a vite/react dev toolchain.
        run: npm audit --omit=dev --audit-level=high

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build

  docker:
    name: Docker (${{ matrix.platform }})
    # Gate the image build on every check-job, not just tests. A lint, bandit
    # or pip-audit regression is not an excuse to ship.
    needs: [tests, lint, security-scan, dependency-audit, frontend]
    # Build each architecture on a NATIVE runner — no QEMU emulation. GitHub's
    # free arm64 runners (ubuntu-24.04-arm, available on public repos) build the
    # linux/arm64 image on real arm64 silicon; the two arches run concurrently
    # and the tagged multi-arch manifest is assembled in docker-merge.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            pair: linux-arm64

    env:
      REGISTRY_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/paperless-ai

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Pull requests: build this architecture natively to validate the
      # Dockerfile. Nothing is pushed.
      - name: Build (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          # Tests run once in the dedicated `tests` job above; the image build
          # never re-runs pytest.
          build-args: |
            RUN_TESTS=0
          # Per-architecture cache scope so the two matrix jobs don't clobber
          # each other's GitHub Actions cache.
          cache-from: type=gha,scope=${{ matrix.pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.pair }}
          # build-push-action v6+ generates provenance/SBOM attestations by
          # default. Keep them off: provenance fetches the PR's git context from
          # the public endpoint, which 500s on Dependabot PRs, and the extra
          # manifest entries complicate the push-by-digest path below. PR builds
          # only need to prove the Dockerfile compiles natively on each arch.
          provenance: false
          sbom: false

      # main: build this architecture natively and push it BY DIGEST (untagged).
      # docker-merge assembles the tagged manifest list from both digests.
      - name: Build and push by digest (main)
        id: build
        if: github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            RUN_TESTS=0
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.pair }}
          # Push the per-arch image by digest only; the tagged manifest list is
          # assembled in docker-merge. Provenance/SBOM attestations stay off —
          # they'd add manifest entries that break the push-by-digest +
          # imagetools-create flow, and provenance 500s on Dependabot PRs.
          provenance: false
          sbom: false

      - name: Export digest
        if: github.event_name == 'push'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digests-${{ matrix.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Docker manifest
    # Runs only after BOTH architecture builds succeed, then assembles and pushes
    # the tagged multi-arch manifest list from the per-architecture digests.
    needs: docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    env:
      REGISTRY_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/paperless-ai

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # REGISTRY_IMAGE and GITHUB_SHA are read from the environment (not ${{ }}
      # interpolation) to keep untrusted-input injection off the shell line.
      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t "${REGISTRY_IMAGE}:latest" \
            -t "${REGISTRY_IMAGE}:sha-${GITHUB_SHA}" \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect "${REGISTRY_IMAGE}:latest"

  cloudflare-refresh:
    name: Cloudflare cache purge
    needs: docker-merge
    # Guard: only run on the canonical repository so forks do not attempt
    # to contact the maintainer's Cloudflare zone.
    if: github.event_name == 'push' && github.repository == 'rossetv/paperless-ai'
    runs-on: ubuntu-latest

    env:
      CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      # Transient 5xx from the Cloudflare API shouldn't tank the run. Each
      # step retries up to 3 times with a short backoff. curl --fail-with-body
      # exits non-zero on 4xx/5xx so the retry loop sees real failures.
      - name: Enable Cloudflare Development Mode
        run: |
          set -e
          for attempt in 1 2 3; do
            if curl --fail-with-body -sS -X PATCH \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/settings/development_mode" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data '{"value":"on"}'; then
              exit 0
            fi
            echo "Attempt ${attempt} failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          exit 1

      - name: Purge Cloudflare cache
        run: |
          set -e
          for attempt in 1 2 3; do
            if curl --fail-with-body -sS -X POST \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data '{"purge_everything":true}'; then
              exit 0
            fi
            echo "Attempt ${attempt} failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          exit 1
